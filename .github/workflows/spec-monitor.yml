name: Spec Monitor

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly, Monday 9am UTC
  workflow_dispatch: # Manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.find.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: find
        run: |
          tools=$(ls specs/*.research.json | sed 's|specs/||;s|\.research\.json||' | jq -Rsc 'split("\n") | map(select(. != ""))')
          echo "tools=$tools" >> "$GITHUB_OUTPUT"

  check-spec:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    strategy:
      matrix:
        tool: ${{ fromJson(needs.discover.outputs.tools) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Read,Glob,Grep,WebSearch,WebFetch,Bash(gh issue create:*),Bash(gh issue list:*)"'
          show_full_output: true
          prompt: |
            You are the spec monitor. Check the **${{ matrix.tool }}** tool spec for drift against official documentation.

            ## Process

            1. Read `specs/${{ matrix.tool }}.research.json` for doc URLs, `llmsTxt` URL, and current spec path
            2. Read the current spec file
            3. For each URL in the `docs` array, try to fetch it with WebFetch
               - If a URL returns 403/blocked, fetch the `llmsTxt` URL from the research config to discover current doc URLs
               - Use the llms.txt index to find replacement URLs for any blocked docs
               - As a last resort, fall back to WebSearch for the tool name + "configuration"
            4. Compare fetched content against the current spec
            5. Note meaningful differences: new config fields, changed formats, deprecated features, new capabilities
            6. Skip cosmetic or documentation-only changes (rewording, typo fixes)

            ## Reporting

            - If NO meaningful changes detected, exit silently. Do not create an issue.
            - If changes ARE detected, first check for an existing open issue:
              `gh issue list --label spec-drift --state open --search "${{ matrix.tool }}" --limit 5`
              If one already covers this tool, skip creating a duplicate.
            - Otherwise, create a GitHub issue:

            ```
            gh issue create \
              --label "spec-drift" \
              --title "Spec drift detected: ${{ matrix.tool }}" \
              --body "<body>"
            ```

            The body should contain:
            - A summary of what changed (### sections per change area)
            - Links to the relevant doc pages
            - A resolution checklist:
              - [ ] Review spec changes
              - [ ] Identify affected emitters
              - [ ] Update spec with `@claude /sync-spec-from-docs ${{ matrix.tool }}`
              - [ ] Update emitter output with `@claude /update-emitter`
              - [ ] Run `pnpm test -- --update` then `pnpm test`
              - [ ] Verify no regressions
